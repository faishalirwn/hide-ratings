<!DOCTYPE html>
<html>
<head>
    <title>Hide ratings</title>
    <link rel="stylesheet" href="css/options.css">
</head>
<body>
    <div class="wrapper">
        <div class="toggle-item">
            <span class="txt">Goodreads</span>
            <div id="goodreads_toggle" class="toggle"></div>
        </div>
        <div class="toggle-item">
            <span class="txt">IMDB</span>
            <div id="imdb_toggle" class="toggle"></div>
        </div>
        <div class="toggle-item">
            <span class="txt">MyAnimeList</span>
            <div id="mal_toggle" class="toggle"></div>
        </div>
        <div class="toggle-item">
            <span class="txt">Letterboxd</span>
            <div id="letterboxd_toggle" class="toggle"></div>
        </div>
        <div class="toggle-item">
            <span class="txt">Google Search</span>
            <div id="google_toggle" class="toggle"></div>
        </div>
        <div class="toggle-item">
            <span class="txt">Trakt</span>
            <div id="trakt_toggle" class="toggle"></div>
        </div>
        <div class="toggle-item">
            <span class="txt">AniList</span>
            <div id="anilist_toggle" class="toggle"></div>
        </div>

        <div id="status_box" class="alert absolute success hidden">Successfully saved options!</div>

        <footer class="credits"><span id="version"></span> | <a href="https://github.com/faishalirwn/hide-ratings" target="_blank">GitHub</a></footer>
    </div>
    <script src="js/options.js"></script>
</body>
</html>
